<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Acquisition Alert</title>
    <style>
        body { font-family: 'Playfair Display', serif; background-color: #fcfcfc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: white; border: 1px solid #e2d1b3; border-radius: 24px; overflow: hidden; }
        .header { background-color: #5d0e11; padding: 40px; text-align: center; color: #d4af37; }
        .content { padding: 40px; }
        .footer { background: #f9f6f2; padding: 30px; text-align: center; font-size: 10px; color: #8e735b; letter-spacing: 2px; text-transform: uppercase; }
        h1 { margin: 0; font-size: 24px; letter-spacing: 4px; text-transform: uppercase; }
        .order-meta { margin-bottom: 30px; border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; }
        .meta-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .label { color: #8e735b; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .value { color: #5d0e11; font-weight: bold; }
        .items-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .items-table th { text-align: left; font-size: 10px; color: #8e735b; text-transform: uppercase; border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
        .items-table td { padding: 15px 0; border-bottom: 1px solid #f9f6f2; font-size: 13px; }
        .btn { display: inline-block; padding: 15px 40px; background-color: #5d0e11; color: white; text-decoration: none; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 20px;">
                <path d="M25 15H50C65 15 75 25 75 35C75 42 70 48 62 52C72 55 80 62 80 72C80 85 70 95 55 95H25V15Z" fill="#D4AF37" fill-opacity="0.2"/>
                <path d="M25 15V95M25 15H50C65 15 75 25 75 35C75 42 70 48 62 52M25 95H55C70 95 80 85 80 72C80 62 72 55 62 52M62 52H25" stroke="#D4AF37" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="38" cy="38" r="6" fill="#D4AF37"/>
                <circle cx="38" cy="72" r="6" fill="#D4AF37"/>
            </svg>
            <h1>Acquisition Alert</h1>
            <p style="font-size: 12px; color: rgba(212, 175, 55, 0.7); letter-spacing: 1px;">A new masterpiece has found its patron.</p>
        </div>
        <div class="content">
            <div class="order-meta">
                <div class="meta-item">
                    <span class="label">Patron Name</span>
                    <span class="value" th:text="${customer}">Ananya Sharma</span>
                </div>
                <div class="meta-item">
                    <span class="label">Credential ID</span>
                    <span class="value" th:text="${orderNumber}">#BADRI-2026-0001</span>
                </div>
                <div class="meta-item">
                    <span class="label">Institutional Revenue</span>
                    <span class="value">₹<span th:text="${amount}">5,499</span></span>
                </div>
            </div>

            <table class="items-table">
                <thead>
                    <tr>
                        <th>Artisanal Piece</th>
                        <th>Qty</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.product.title}">Maroon Anarkali</td>
                        <td th:text="${item.quantity}">1</td>
                        <td>₹<span th:text="${item.price}">5,499</span></td>
                    </tr>
                </tbody>
            </table>

            <div style="text-align: center;">
                <a href="http://localhost:5173/admin/orders" class="btn">View in Dashboard</a>
            </div>
        </div>
        <div class="footer">
            BadriBhai Apparels • Artisanal Excellence Since 1992
        </div>
    </div>
</body>
</html>
